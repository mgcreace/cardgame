<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Card Game Shop</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      text-align: center;
      padding-top: 40px;
    }

    button {
      padding: 12px 20px;
      margin: 10px;
      font-size: 16px;
      border-radius: 10px;
      cursor: pointer;
    }

    #coins {
      color: #00ff88;
      font-size: 20px;
      margin: 10px;
    }

    #user {
      opacity: 0.7;
      margin-bottom: 20px;
    }

    .shop {
      margin-top: 30px;
      border-top: 1px solid #333;
      padding-top: 20px;
    }
  </style>
</head>

<body>

<h1>🎴 Card Game Shop</h1>

<div id="user">Loading...</div>
<div id="coins">💰 Coins: 0</div>

<button onclick="addCoins()">+10 Coins Test</button>

<div class="shop">
  <h2>💰 Shop</h2>

  <button onclick="buyCoins(50)">50 Coins</button>
  <button onclick="buyCoins(200)">200 Coins</button>
  <button onclick="buyCoins(1000)">1000 Coins</button>

  <div id="shopStatus"></div>
</div>

<script>
/* ---------------- TELEGRAM ---------------- */

const tg = window.Telegram?.WebApp;
tg?.expand();

const user = tg?.initDataUnsafe?.user;

const userId = user ? user.id : null;
const username = user ? user.first_name : "Guest";

document.getElementById("user").innerText =
userId ? `User: ${username}` : "⚠️ Open in Telegram";

/* ---------------- SAVE ---------------- */

let data = JSON.parse(localStorage.getItem("game_" + userId)) || {
  coins: 0,
  cards: []
};

function save() {
  localStorage.setItem("game_" + userId, JSON.stringify(data));
  updateUI();
  sendToBot();
}

/* ---------------- UI ---------------- */

function updateUI() {
  document.getElementById("coins").innerText =
    "💰 Coins: " + data.coins;
}

updateUI();

/* ---------------- SYNC ---------------- */

function sendToBot() {
  try {
    tg.sendData(JSON.stringify({
      coins: data.coins,
      cards: data.cards
    }));
  } catch {}
}

/* ---------------- GAME TEST ---------------- */

function addCoins() {
  data.coins += 10;
  save();
}

/* ---------------- SHOP ---------------- */

function buyCoins(amount) {
  tg.sendData(JSON.stringify({
    action: "buy_coins",
    amount: amount
  }));

  document.getElementById("shopStatus").innerText =
    "✅ Kauf gesendet: " + amount;
}
</script>

</body>
</html>
